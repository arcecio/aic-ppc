version: '3.9'

# AI-Powered Pre-Plan Check Assistant (AIP PPC) — City of Los Angeles / LADBS
# RFP 2025AIP007. Full stack runs on Colima (Docker) just like the Blue reference:
# Postgres + Spring Boot backend + React/nginx frontend.
#
# Ports are offset from the Blue/munch stacks that may already be running on the
# same Colima VM (5432/5433, 8080/8081, 80/8090) so this stack can coexist.

services:
  postgres:
    # Postgres 16 + pgvector (see backend/docker/postgres/Dockerfile). pgvector
    # backs the semantic arm of the knowledgebase retriever (V4 migration).
    build:
      context: ./backend/docker/postgres
    container_name: aip-ppc-postgres
    environment:
      POSTGRES_DB: aipppc
      POSTGRES_USER: aipppc
      POSTGRES_PASSWORD: aipppc
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipppc"]
      interval: 10s
      timeout: 5s
      retries: 5

  tei:
    # Text Embeddings Inference sidecar (intfloat/e5-large-v2) for the vector
    # retrieval arm — same setup as Blue. Gated behind the `docker-tei` profile:
    # TEI publishes amd64-only CPU images that crawl under Rosetta on Apple
    # Silicon; on macOS install the native binary instead
    # (`brew install text-embeddings-inference`, run on :8086). On linux/amd64:
    # `docker compose --profile docker-tei up` (first boot downloads ~1.3 GB of
    # weights, cached in the named volume) and set EMBEDDING_URL=http://tei:80.
    # The system degrades to lexical-only retrieval when this is absent.
    profiles: ["docker-tei"]
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    platform: linux/amd64
    container_name: aip-ppc-tei
    command: ["--model-id", "intfloat/e5-large-v2"]
    ports:
      - "8086:80"
    volumes:
      - tei_cache:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 240s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aip-ppc-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/aipppc
      DB_USER: aipppc
      DB_PASS: aipppc
      JWT_SECRET: change-me-in-production-minimum-256-bits-long-secret-key-for-aip-ppc
      # Anthropic Claude powers the AI-assisted analysis arm. Optional: when
      # unset the engine runs rules-only and the AI provider degrades to a
      # deterministic heuristic (see docs/05-ai-and-governance.md).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STORAGE_PATH: /app/storage
      # Email auto-promoted to STAFF+ADMIN on boot so a fresh DB isn't locked out.
      APP_BOOTSTRAP_ADMIN_EMAIL: ${APP_BOOTSTRAP_ADMIN_EMAIL:-admin@lacity.gov}
      # Embedding sidecar for vector retrieval. Defaults to a host-native TEI
      # binary on :8086 (macOS); override to http://tei:80 with the docker-tei
      # profile on linux/amd64. Degrades to lexical-only when unreachable.
      EMBEDDING_URL: ${EMBEDDING_URL:-http://host.docker.internal:8086}
      EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-true}
      # Monthly knowledgebase refresh (SOW 2.2.13): corpus upsert + re-embed.
      KB_SCHEDULER_ENABLED: "true"
    ports:
      - "8082:8080"
    volumes:
      - storage_data:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aip-ppc-frontend
    depends_on:
      - backend
    ports:
      - "8095:80"

volumes:
  postgres_data:
  storage_data:
  tei_cache:
