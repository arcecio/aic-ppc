spring:
  application:
    name: aip-ppc-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/aipppc}
    username: ${DB_USER:aipppc}
    password: ${DB_PASS:aipppc}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-needs-to-be-at-least-256-bits-long-secret-key-for-aip-ppc}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  bootstrap:
    # Email of a user to auto-promote to STAFF + ADMIN at startup. Idempotent —
    # runs every boot, no-op if already elevated or not yet registered. Mirrors
    # how the City would grant an initial staff/admin via Okta group membership.
    admin-email: ${APP_BOOTSTRAP_ADMIN_EMAIL:}

  storage:
    base-path: ${STORAGE_PATH:./storage}
    # Max upload size (bytes) enforced by the security scan before AI integration.
    max-file-bytes: ${STORAGE_MAX_FILE_BYTES:104857600}

  screening:
    # SOW 2.2.10: return a result within 30 minutes for 90% of projects. The MVP
    # runs synchronously-async in-process; this is the KPI target used by the
    # analytics dashboard, not a hard cutoff.
    target-processing-ms: ${SCREENING_TARGET_MS:1800000}

  ai:
    # Which AI provider augments the rule-based engine. Values: anthropic | none.
    # When 'none' (or no API key), screening is rules-only + deterministic
    # heuristic augmentation so the system runs fully offline.
    provider: ${AI_PROVIDER:anthropic}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      api-url: ${ANTHROPIC_API_URL:https://api.anthropic.com/v1}
      default-model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
      max-tokens: ${ANTHROPIC_MAX_TOKENS:4096}

logging:
  level:
    com.lacity.aipppc: DEBUG
    org.springframework.security: INFO
