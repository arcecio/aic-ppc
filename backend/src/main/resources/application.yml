spring:
  application:
    name: aip-ppc-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/aipppc}
    username: ${DB_USER:aipppc}
    password: ${DB_PASS:aipppc}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-needs-to-be-at-least-256-bits-long-secret-key-for-aip-ppc}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  bootstrap:
    # Email of a user to auto-promote to STAFF + ADMIN at startup. Idempotent —
    # runs every boot, no-op if already elevated or not yet registered. Mirrors
    # how the City would grant an initial staff/admin via Okta group membership.
    admin-email: ${APP_BOOTSTRAP_ADMIN_EMAIL:admin1@aip.com}

  storage:
    base-path: ${STORAGE_PATH:./storage}
    # Max upload size (bytes) enforced by the security scan before AI integration.
    max-file-bytes: ${STORAGE_MAX_FILE_BYTES:104857600}

  screening:
    # SOW 2.2.10: return a result within 30 minutes for 90% of projects. The MVP
    # runs synchronously-async in-process; this is the KPI target used by the
    # analytics dashboard, not a hard cutoff.
    target-processing-ms: ${SCREENING_TARGET_MS:1800000}

  ai:
    # Which AI provider augments the rule-based engine. Values: anthropic | lmstudio | none.
    # When 'none' (or the configured provider is unreachable), screening is rules-only +
    # deterministic heuristic augmentation so the system runs fully offline.
    provider: ${AI_PROVIDER:anthropic}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      api-url: ${ANTHROPIC_API_URL:https://api.anthropic.com/v1}
      default-model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
      max-tokens: ${ANTHROPIC_MAX_TOKENS:4096}
    lmstudio:
      # LM Studio's OpenAI-compatible server. Runs locally, so City data never
      # leaves the host. No API key required by default; set default-model to the
      # identifier of the model currently loaded in LM Studio.
      api-url: ${LMSTUDIO_API_URL:http://localhost:1234/v1}
      api-key: ${LMSTUDIO_API_KEY:}
      default-model: ${LMSTUDIO_MODEL:local-model}
      max-tokens: ${LMSTUDIO_MAX_TOKENS:4096}
      temperature: ${LMSTUDIO_TEMPERATURE:0.2}

  embedding:
    # Semantic-retrieval sidecar for the knowledgebase (Blue's TEI pattern):
    # Hugging Face Text Embeddings Inference serving intfloat/e5-large-v2
    # (1024-dim). Optional — when unreachable the retriever degrades to
    # lexical-only and screening is unaffected. Default port is 8086 (not Blue's
    # 8081, which other stacks on this host occupy). macOS: `brew install
    # text-embeddings-inference` and run on :8086; linux/amd64: use the
    # `docker-tei` compose profile.
    enabled: ${EMBEDDING_ENABLED:true}
    url: ${EMBEDDING_URL:http://localhost:8086}
    model: ${EMBEDDING_MODEL:intfloat/e5-large-v2}
    dim: ${EMBEDDING_DIM:1024}

  kb:
    scheduler:
      # Scheduled knowledgebase refresh (SOW 2.2.13 — automated monthly updates).
      # Re-runs the corpus upsert + embedding backfill. Off by default; compose
      # enables it. Default: 04:00 on the 1st of each month.
      enabled: ${KB_SCHEDULER_ENABLED:false}
      cron: ${KB_SCHEDULER_CRON:0 0 4 1 * *}

logging:
  level:
    com.lacity.aipppc: DEBUG
    org.springframework.security: INFO
